<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Sadhana</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(232,184,109,0.2)}
body{min-height:100vh;overflow-y:auto;background:linear-gradient(160deg,#0d0d1a,#1a0d2e 50%,#0d1a1a);font-family:Georgia,serif;color:#f0e6d0;display:flex;flex-direction:column;align-items:center}
.hdr{width:100%;padding:16px;text-align:center;border-bottom:1px solid rgba(232,184,109,0.15);background:rgba(0,0,0,0.3)}
.hdr h1{font-size:13px;letter-spacing:4px;color:#E8B86D;text-transform:uppercase;font-weight:normal}
.hdr p{font-size:11px;color:rgba(240,230,208,0.4);letter-spacing:2px;margin-top:4px}
.pg{display:none;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:24px 20px 80px}
.pg.show{display:flex}
.done-pg{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;width:100%;max-width:420px;padding:40px 20px}
.done-pg.show{display:flex}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
@keyframes glow{0%,100%{text-shadow:0 0 8px #E8B86D}50%{text-shadow:0 0 30px #E8B86D,0 0 50px #C8906D}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.bell-home{font-size:60px;display:block;text-align:center;margin-bottom:10px;animation:glow 2s infinite}
.bell-home.ding{animation:shake 0.4s ease}
.page-title{font-size:26px;color:#E8B86D;text-align:center;font-weight:normal;margin-bottom:4px;animation:glow 2s infinite}
.page-sub{font-size:12px;color:rgba(240,230,208,0.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;text-align:center}
.seq-list{width:100%;margin-bottom:24px}
.seq-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);margin-bottom:6px}
.seq-n{width:22px;height:22px;border-radius:50%;background:rgba(232,184,109,0.2);color:#E8B86D;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seq-name{font-size:13px;flex:1}
.seq-dur{font-size:11px;color:rgba(240,230,208,0.4)}
.total{font-size:12px;color:rgba(240,230,208,0.35);letter-spacing:1px;margin-bottom:24px;text-align:center}
.btn-main{padding:16px 48px;border-radius:50px;border:none;background:linear-gradient(135deg,#E8B86D,#C8906D);color:#1a0d0d;font-size:16px;font-family:inherit;letter-spacing:2px;cursor:pointer;font-weight:bold;text-transform:uppercase;box-shadow:0 4px 24px rgba(232,184,109,0.3);touch-action:manipulation;display:block;margin-bottom:14px}
.btn-test{padding:13px 36px;border-radius:50px;border:2px solid #E8B86D;background:rgba(232,184,109,0.1);color:#E8B86D;font-size:14px;font-family:inherit;letter-spacing:2px;cursor:pointer;touch-action:manipulation;display:block}
.dots{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.dot{height:6px;border-radius:3px;transition:all 0.3s}
.dot.done{width:6px;background:#E8B86D}
.dot.cur{width:20px;background:#E8B86D}
.dot.next{width:6px;background:rgba(255,255,255,0.15)}
.card{width:100%;border-radius:20px;padding:28px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center;margin-bottom:16px}
.card-icon{font-size:48px;display:block;margin-bottom:8px}
.card-name{font-size:22px;margin:0 0 2px;font-weight:normal}
.card-san{font-size:14px;color:rgba(240,230,208,0.5);font-style:italic;margin:0 0 4px}
.card-sub{font-size:13px;color:rgba(240,230,208,0.6);margin:0 0 20px}
.ring-wrap{position:relative;width:160px;height:160px;margin:0 auto 10px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.big-time{font-size:52px;font-weight:100;letter-spacing:2px}
.time-sub{font-size:11px;color:rgba(240,230,208,0.4);letter-spacing:1px}
.bell-ind{font-size:28px;display:block;margin-top:8px;opacity:0.3;transition:all 0.3s}
.bell-ind.ding{opacity:1;filter:drop-shadow(0 0 12px #E8B86D);animation:shake 0.4s ease}
.btn-done{margin-top:16px;padding:13px 40px;border-radius:50px;border:2px solid #E8B86D;background:rgba(232,184,109,0.15);color:#E8B86D;font-size:15px;font-family:inherit;letter-spacing:2px;cursor:pointer;touch-action:manipulation;text-transform:uppercase}
.btn-done:active{background:rgba(232,184,109,0.35)}
.step-lbl{font-size:11px;color:rgba(240,230,208,0.3);letter-spacing:1px;margin-top:4px}
.count-big{font-size:64px;font-weight:100}
.count-of{font-size:12px;color:rgba(240,230,208,0.4)}
.gap-box{margin-top:12px}
.gap-lbl{font-size:13px;color:rgba(240,230,208,0.5)}
.gap-num{font-size:40px;font-weight:100}
.tap-hint{font-size:14px;margin-top:12px;animation:pulse 1.2s infinite}
.btn-count{padding:14px 40px;border-radius:50px;border:1.5px solid #C8849A;background:rgba(200,132,154,0.13);color:#C8849A;font-size:14px;font-family:inherit;letter-spacing:2px;cursor:pointer;touch-action:manipulation;margin-top:12px;text-transform:uppercase}
.done-icon{font-size:80px;margin-bottom:16px;animation:glow 2s infinite}
.done-title{font-size:28px;color:#E8B86D;font-weight:normal;margin-bottom:8px}
.done-sub{font-size:13px;color:rgba(240,230,208,0.5);letter-spacing:3px;margin-bottom:40px}
</style>
</head>
<body>

<div class="hdr">
  <h1>&#128701; Mandir Timer</h1>
  <p>Sacred Yoga Sequence</p>
</div>

<!-- HOME -->
<div id="pg-home" class="pg show">
  <span class="bell-home" id="bell-home">&#128276;</span>
  <h2 class="page-title">Daily Sadhana</h2>
  <p class="page-sub">Morning Yoga Practice</p>
  <div class="seq-list" id="seq-list"></div>
  <p class="total" id="total-time"></p>
  <button class="btn-main" id="btn-begin">Begin</button>
  <button class="btn-test" id="btn-test">&#128276; Test Bell</button>
  <button class="btn-test" id="btn-step6" style="margin-top:10px;border-color:rgba(200,132,154,0.7);color:#C8849A">&#x0950; Test Step 6</button>
</div>

<!-- TIMER STEP -->
<div id="pg-timer" class="pg">
  <div class="dots" id="dots-timer"></div>
  <div class="card">
    <span class="card-icon" id="t-icon"></span>
    <h2 class="card-name" id="t-name"></h2>
    <p class="card-san" id="t-san"></p>
    <p class="card-sub" id="t-sub"></p>
    <div class="ring-wrap">
      <svg width="160" height="160">
        <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
        <circle id="progress-ring" cx="80" cy="80" r="70" fill="none" stroke="#E8B86D"
          stroke-width="8" stroke-dasharray="440" stroke-dashoffset="0"
          stroke-linecap="round" style="transition:stroke-dashoffset 0.9s ease"/>
      </svg>
      <div class="ring-center">
        <div class="big-time" id="t-time">0:00</div>
        <div class="time-sub">remaining</div>
      </div>
    </div>
    <span class="bell-ind" id="bell-timer">&#128276;</span>
  </div>
  <div class="step-lbl" id="t-lbl"></div>
  <button class="btn-done" id="btn-done" style="display:none" onclick="skipStep()">Done &#10003;</button>
</div>

<!-- OM CHANTING STEP -->
<div id="pg-count" class="pg">
  <div class="dots" id="dots-count"></div>
  <div class="card">
    <span class="card-icon" style="font-size:56px;color:#C8849A">&#x0950;</span>
    <h2 class="card-name" style="color:#C8849A">OM Chanting</h2>
    <p class="card-san">&#x0950;</p>
    <p class="card-sub" style="margin-bottom:20px">21 times with 30s gap</p>
    <div class="ring-wrap">
      <svg width="160" height="160">
        <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
        <circle id="count-ring" cx="80" cy="80" r="70" fill="none" stroke="#C8849A"
          stroke-width="8" stroke-dasharray="440" stroke-dashoffset="440"
          stroke-linecap="round" style="transition:stroke-dashoffset 0.5s ease"/>
      </svg>
      <div class="ring-center">
        <div class="count-big" id="c-num">1</div>
        <div class="count-of">of 21</div>
      </div>
    </div>
    <div id="c-gap" class="gap-box" style="display:none">
      <div class="gap-lbl">Count in</div>
      <div class="gap-num" id="c-gap-num" style="color:#C8849A">30</div>
    </div>
    <div id="c-hint" class="tap-hint" style="color:#C8849A">Preparing...</div>
    <span class="bell-ind" id="bell-count">&#128276;</span>
  </div>
  <button class="btn-count" id="btn-count" style="display:none">Chant OM</button>
  <div class="step-lbl" id="c-lbl"></div>
</div>

<!-- DONE -->
<div id="pg-done" class="done-pg">
  <div class="done-icon">&#128591;</div>
  <h2 class="done-title">Sadhana Complete</h2>
  <p class="done-sub">OM SHANTI</p>
  <button class="btn-main" id="btn-again">Begin Again</button>
</div>

<script>
// ── BELL SOUND (Web Audio synthesis) ─────────────────────────
var ctx = null;

function bell() {
  try {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    var t = ctx.currentTime;
    var freqs = [800, 1260, 1860, 2450, 3050];
    var gains = [0.8, 0.55, 0.3, 0.18, 0.09];
    var decays = [1.6, 1.1, 0.8, 0.5, 0.3];
    for (var i = 0; i < freqs.length; i++) {
      (function(f, g, d) {
        var osc = ctx.createOscillator();
        var env = ctx.createGain();
        osc.connect(env); env.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        env.gain.setValueAtTime(0.001, t);
        env.gain.exponentialRampToValueAtTime(g, t + 0.004);
        env.gain.exponentialRampToValueAtTime(0.001, t + d);
        osc.start(t); osc.stop(t + d + 0.05);
      })(freqs[i], gains[i], decays[i]);
    }
    // click transient
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.02), ctx.sampleRate);
    var ch = buf.getChannelData(0);
    for (var j = 0; j < ch.length; j++) ch[j] = (Math.random()*2-1) * (1 - j/ch.length);
    var ns = ctx.createBufferSource();
    var bpf = ctx.createBiquadFilter();
    var ng = ctx.createGain();
    bpf.type = 'bandpass'; bpf.frequency.value = 1800; bpf.Q.value = 2;
    ns.buffer = buf; ns.connect(bpf); bpf.connect(ng); ng.connect(ctx.destination);
    ng.gain.setValueAtTime(0.35, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    ns.start(t); ns.stop(t + 0.025);
  } catch(e) { console.log('bell err', e); }
  // visual ding
  ['bell-home','bell-timer','bell-count'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add('ding');
    setTimeout(function(){ el.classList.remove('ding'); }, 1500);
  });
}

// ── SEQUENCE ──────────────────────────────────────────────────
var SEQ = [
  { name:'Patangasana',     san:'\u092a\u0924\u0902\u0917\u093e\u0938\u0928',     sub:'Kite Pose',          dur:150,  icon:'\uD83E\uDD8B', col:'#E8B86D' },
  { name:'Shishupalasana',  san:'\u0936\u093f\u0936\u0941\u092a\u093e\u0932\u093e\u0938\u0928', sub:'Right Leg',          dur:150,  icon:'\uD83C\uDF3F', col:'#7EB88A' },
  { name:'Shishupalasana',  san:'\u0936\u093f\u0936\u0941\u092a\u093e\u0932\u093e\u0938\u0928', sub:'Left Leg',           dur:150,  icon:'\uD83C\uDF3F', col:'#7EB88A' },
  { name:'Nadivibhajana',   san:'\u0928\u093E\u0921\u0940 \u0935\u093F\u092D\u093E\u091C\u0928', sub:'8 minutes',          dur:480,  icon:'\uD83C\uDF19', col:'#7B9EC8' },
  { name:'Sukhasana',       san:'\u0938\u0941\u0916\u093E\u0938\u0928',             sub:'Easy Pose - 7 min',  dur:420,  icon:'\u2600\uFE0F', col:'#E8B86D' },
  { name:'OM Chanting',     san:'\u0950',                                               sub:'21 times, 12s gap',  dur:null, icon:'\uD83D\uDD49\uFE0F', col:'#C8849A', om:true, auto:true },
  { name:'Vipareeta Swasa', san:'\u0935\u093F\u092A\u0930\u0940\u0924 \u0936\u094D\u0935\u093E\u0938', sub:'Reverse Breathing',  dur:180,  icon:'\uD83C\uDF2C\uFE0F', col:'#9E7EC8' },
  { name:'Bandhas',         san:'\u092C\u0902\u0927',                                              sub:'2 minutes',          dur:120,  icon:'\uD83E\uDDD8', col:'#C8906D' },
  
  { name:'Meditation',      san:'\u0927\u094D\u092F\u093E\u0928',                   sub:'Rest - 7 minutes',   dur:420,  icon:'\uD83C\uDF19', col:'#7B9EC8' }
];

// ── STATE ─────────────────────────────────────────────────────
var step = 0, timeLeft = 0, ticker = null;
var cNum = 1, cGap = 0, gTicker = null, inGap = false;

// ── HELPERS ───────────────────────────────────────────────────
function fmt(s) { return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60); }

function showPage(id) {
  var pages = ['pg-home','pg-timer','pg-count','pg-done'];
  for (var i=0; i<pages.length; i++) {
    var el = document.getElementById(pages[i]);
    el.classList.remove('show');
    el.style.display = '';
  }
  document.getElementById(id).classList.add('show');
  document.getElementById(id).style.display = 'flex';
}

function makeDots(elId, cur) {
  var h = '';
  for (var i=0; i<SEQ.length; i++) {
    var cls = i < cur ? 'done' : i === cur ? 'cur' : 'next';
    h += '<div class="dot ' + cls + '"></div>';
  }
  document.getElementById(elId).innerHTML = h;
}

function setRing(id, pct, col) {
  var el = document.getElementById(id);
  el.style.stroke = col;
  el.setAttribute('stroke-dashoffset', (440 * (1 - pct)).toFixed(1));
}

// ── BUILD HOME ────────────────────────────────────────────────
function buildHome() {
  var h = ''; var tot = 0;
  for (var i=0; i<SEQ.length; i++) {
    var s = SEQ[i];
    var d = s.om ? 21*30 : s.dur;
    tot += d;
    h += '<div class="seq-item">' +
         '<div class="seq-n">' + (i+1) + '</div>' +
         '<span style="font-size:18px">' + s.icon + '</span>' +
         '<span class="seq-name">' + s.name + ' &mdash; ' + s.sub + '</span>' +
         '<span class="seq-dur">' + (s.om ? '&times;21' : fmt(s.dur)) + '</span>' +
         '</div>';
  }
  document.getElementById('seq-list').innerHTML = h;
  document.getElementById('total-time').textContent = 'Total: ~' + Math.round(tot/60) + ' minutes';
}

// ── NAVIGATION ────────────────────────────────────────────────
function goStep(idx) {
  clearInterval(ticker); clearInterval(gTicker);
  if (idx >= SEQ.length) { showPage('pg-done'); return; }
  step = idx;
  var s = SEQ[idx];
  setTimeout(bell, 400);
  if (s.om) { startCount(idx); } else { startTimer(s, idx); }
}

function startTimer(s, idx) {
  showPage('pg-timer');
  makeDots('dots-timer', idx);
  document.getElementById('t-icon').textContent = s.icon;
  var nm = document.getElementById('t-name');
  nm.textContent = s.name; nm.style.color = s.col;
  document.getElementById('t-san').textContent = s.san;
  document.getElementById('t-sub').textContent = s.sub;
  document.getElementById('t-lbl').textContent = 'Step ' + (idx+1) + ' of ' + SEQ.length;
  document.getElementById('btn-done').style.display = (idx === 3) ? 'block' : 'none';
  timeLeft = s.dur;
  document.getElementById('t-time').textContent = fmt(timeLeft);
  setRing('progress-ring', 1, s.col);
  ticker = setInterval(function() {
    timeLeft--;
    document.getElementById('t-time').textContent = fmt(timeLeft);
    setRing('progress-ring', timeLeft / s.dur, s.col);
    if (timeLeft <= 0) { clearInterval(ticker); setTimeout(function(){ goStep(idx+1); }, 700); }
  }, 1000);
}

function startCount(idx) {
  showPage('pg-count');
  makeDots('dots-count', idx);
  document.getElementById('c-lbl').textContent = 'Step ' + (idx+1) + ' of ' + SEQ.length;
  document.getElementById('btn-count').style.display = 'none';
  document.getElementById('c-hint').style.display = 'none';
  document.getElementById('c-gap').style.display = 'none';
  document.getElementById('count-ring').setAttribute('stroke-dashoffset','440');
  document.getElementById('c-num').textContent = '';
  cNum = 1;
  // Wait 12s then ring and show count 1, repeat for 21 counts
  runOmCount(idx);
}

function runOmCount(idx) {
  // Show countdown gap
  cGap = 12;
  document.getElementById('c-gap').style.display = 'block';
  document.getElementById('c-gap-num').textContent = cGap;
  clearInterval(gTicker);
  gTicker = setInterval(function() {
    cGap--;
    document.getElementById('c-gap-num').textContent = cGap;
    if (cGap <= 0) {
      clearInterval(gTicker);
      // Ring bell
      bell();
      // Show count number
      document.getElementById('c-num').textContent = cNum;
      document.getElementById('c-gap').style.display = 'none';
      // Update ring progress
      document.getElementById('count-ring').setAttribute('stroke-dashoffset', (440*(1-cNum/21)).toFixed(1));
      if (cNum >= 21) {
        // All done
        setTimeout(function(){ goStep(idx+1); }, 2000);
      } else {
        cNum++;
        runOmCount(idx);
      }
    }
  }, 1000);
}

function skipStep() {
  clearInterval(ticker);
  goStep(step + 1);
}

function doCount() {}

// ── BUTTON WIRING ─────────────────────────────────────────────
document.getElementById('btn-begin').addEventListener('click', function() {
  goStep(0);
});
document.getElementById('btn-test').addEventListener('click', function() {
  bell();
});
document.getElementById('btn-step6').addEventListener('click', function() {
  goStep(5);
});
document.getElementById('btn-count').addEventListener('click', doCount);
document.getElementById('btn-again').addEventListener('click', function() {
  showPage('pg-home');
});

// init
buildHome();
</script>
</body>
</html>
